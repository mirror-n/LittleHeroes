<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Camera body (circle) -->
  <circle cx="32" cy="28" r="18" fill="none" stroke="#263238" stroke-width="2.5"/>
  <!-- Camera lens (inner circle) -->
  <circle cx="32" cy="28" r="8" fill="none" stroke="#263238" stroke-width="2.5"/>
  <!-- Camera lens dot (center) -->
  <circle cx="32" cy="28" r="3" fill="#263238"/>
  <!-- Camera indicator light -->
  <circle cx="32" cy="7" r="3" fill="#263238"/>
  <!-- Stand -->
