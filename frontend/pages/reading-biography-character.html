<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Heroes - Biography Episodes</title>
    <meta data-page-title-ko="꼬마 위인 - 위인전 에피소드" data-page-title-en="Little Heroes - Biography Episodes" />
    <link rel="stylesheet" href="../styles/main.css?v=2" />
    <link rel="stylesheet" href="../styles/reading-biography-character.css?v=2" />
  </head>
  <body class="background-green">
    <!-- Tabs Banner -->
    <header class="tabs-banner">
      <nav class="navigation">
        <a href="home.html" class="tab-link" data-ko="홈" data-en="Home">Home</a>
        <a href="talk.html" class="tab-link" data-ko-html="대화하기 <span class='icon'>🎤</span>" data-en-html="Talk <span class='icon'>🎤</span>">
          Talk <span class="icon">🎤</span>
        </a>
        <a href="reading-biography.html" class="tab-link active" data-ko-html="위인전 읽기 <span class='icon'>📖</span>" data-en-html="Reading Biography <span class='icon'>📖</span>">
          Reading Biography <span class="icon">📖</span>
        </a>
        <a href="plan.html" class="tab-link" data-ko="요금제" data-en="Plan">Plan</a>
        <a href="our-vision.html" class="tab-link" data-ko="우리의 비전" data-en="Our Vision">Our Vision</a>
        <div class="logo-icon">
          <img src="../images/corner_icon.png" alt="AI Smiley Icon" />
        </div>
      </nav>
    </header>

    <!-- Page Content -->
    <main class="episodes-content">
      <div class="biography-title-box background-lightblue">
        <h1 class="text-content2" id="biography-title">Loading...</h1>
      </div>

      <div class="episodes-grid" id="episodes-grid">
        <!-- Episodes will be dynamically inserted here -->
      </div>
    </main>

    <!-- Load episodes data as JavaScript file (works without web server) -->
    <script src="../data/episodes-titles.js?v=2"></script>

    <script>
      // Character name mapping (from reading-biography.html to JSON keys)
      const characterMap = {
        abe: "abe",
        leo: "leo",
        al: "al",
        isac: "isac",
        socrate: "socrate",
        willy: "willy",
        chales: "chales",
        marie: "marie",
        hellen: "hellen",
        wolf: "wolf",
        charlie: "chally",
        andy: "andy",
      };

      // Episode availability (set to true to enable)
      // All episodes are now available
      const episodeAvailability = {
        abe: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        leo: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        al: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        isac: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        socrate: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        willy: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        chales: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        marie: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        hellen: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        wolf: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        chally: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
        andy: { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true, 11: true, 12: true },
      };

      // Get URL parameter
      function getURLParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      // Load and display episodes
      function loadEpisodes() {
        const characterParam = getURLParameter("character");

        if (!characterParam) {
          document.getElementById("biography-title").textContent =
            "Character not specified";
          return;
        }

        const characterKey = characterMap[characterParam.toLowerCase()];

        if (!characterKey) {
          document.getElementById("biography-title").textContent =
            "Character not found";
          return;
        }

        try {
          // Episodes data is loaded from episodes-titles.js via script tag
          // The variable 'episodesData' is now available globally
          if (typeof episodesData === "undefined") {
            throw new Error(
              "Episodes data not loaded. Make sure episodes-titles.js is accessible."
            );
          }

          const characterData = episodesData[characterKey];

          if (!characterData) {
            document.getElementById("biography-title").textContent =
              "Character data not found";
            return;
          }

          // Get current language (use same key as language-switcher.js)
          const currentLang = localStorage.getItem('littleHeroesLanguage') || 'en';

          // Korean full names mapping
          const fullNameKo = {
            abe: '에이브러햄 링컨', leo: '레오나르도 다빈치', al: '알버트 아인슈타인',
            isac: '아이작 뉴턴', socrate: '소크라테스', willy: '윌리엄 셰익스피어',
            chales: '찰스 다윈', marie: '마리 퀴리', hellen: '헬렌 켈러',
            wolf: '볼프강 아마데우스 모차르트', chally: '찰리 채플린', andy: '앤드류 카네기'
          };

          // Update title based on language
          if (currentLang === 'ko' && fullNameKo[characterKey]) {
            document.getElementById("biography-title").textContent =
              fullNameKo[characterKey] + " 위인전";
            document.title = `꼬마 위인 - ${fullNameKo[characterKey]} 위인전`;
          } else {
            document.getElementById("biography-title").textContent =
              characterData.fullName + " Biography";
            document.title = `Little Heroes - ${characterData.fullName} Biography`;
          }

          // Clear existing episodes
          const episodesGrid = document.getElementById("episodes-grid");
          episodesGrid.innerHTML = "";

          // Create episode boxes
          characterData.episodes.forEach((episodeData, index) => {
            const availabilityForCharacter =
              episodeAvailability[characterKey] || {};
            const episodeNumber = index + 1;
            const isAvailable = availabilityForCharacter[episodeNumber] === true;
            const episodeBoxLink = document.createElement("a");
            episodeBoxLink.href = `reading-biography-character-episode.html?character=${characterParam}&episode=${episodeNumber}`;
            episodeBoxLink.className = "episode-box-link";

            const episodeBox = document.createElement("div");
            episodeBox.className = "episode-box background-darkblue";
            
            // Get title in current language
            let displayTitle = episodeData.title_en;
            if (currentLang === 'ko' && episodeData.title_ko) {
              displayTitle = episodeData.title_ko;
            }
            
            const episodeLabel = currentLang === 'ko' ? '에피소드' : 'Episode';
            episodeBox.innerHTML = `<p class="text-content3">${episodeLabel} ${
              episodeNumber
            }: ${displayTitle}</p>`;

            episodeBoxLink.appendChild(episodeBox);
            episodesGrid.appendChild(episodeBoxLink);

            if (!isAvailable) {
              episodeBoxLink.classList.add("unavailable");
              episodeBoxLink.setAttribute("aria-disabled", "true");
              episodeBoxLink.removeAttribute("href");
            }
          });
        } catch (error) {
          console.error("Error loading episodes:", error);
          document.getElementById("biography-title").textContent =
            "Error loading episodes";
          document.getElementById("episodes-grid").innerHTML =
            "<p style='color: red; text-align: center; padding: 20px;'>" +
            "Error: " +
            error.message +
            "</p>";
        }
      }

      // Listen for language changes from language switcher (same tab)
      window.addEventListener('languageChanged', function(e) {
        loadEpisodes();
      });

      // Also listen for storage changes (cross-tab)
      window.addEventListener('storage', function(e) {
        if (e.key === 'littleHeroesLanguage') {
          loadEpisodes();
        }
      });

      // Initialize on page load
      window.addEventListener("DOMContentLoaded", loadEpisodes);

      // Handle browser back/forward navigation
      window.addEventListener("popstate", loadEpisodes);
    </script>

    <!-- Global Language Switcher -->
    <script src="../scripts/language-switcher.js?v=2"></script>
  </body>
</html>
