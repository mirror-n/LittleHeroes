<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Heroes - Select Profile</title>
  <link rel="stylesheet" href="../styles/main.css?v=4" />
  <link rel="stylesheet" href="../styles/auth.css?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Navigation -->
  <header class="tabs-banner">
    <nav class="navigation">
      <a href="home.html" class="tab-link" data-ko="홈" data-en="Home">Home</a>
      <a href="talk.html" class="tab-link" data-ko-html="대화하기 <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />" data-en-html="Talk <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />">
        Talk <img src="../images/icons/icon-mic-small.svg" alt="" class="nav-icon" />
      </a>
      <a href="reading-biography.html" class="tab-link" data-ko-html="위인전 읽기 <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />" data-en-html="Reading Biography <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />">
        Reading Biography <img src="../images/icons/icon-book-small.svg" alt="" class="nav-icon" />
      </a>
      <a href="plan.html" class="tab-link" data-ko="요금제" data-en="Plan">Plan</a>
      <a href="our-vision.html" class="tab-link" data-ko="우리의 비전" data-en="Our Vision">Our Vision</a>
      <div class="logo-icon">
        <img src="../images/corner_icon.png" alt="Little Heroes Icon" />
      </div>
    </nav>
  </header>

  <!-- Profile Selection -->
  <main class="profile-container">
    <h1 class="profile-title" id="profileTitle" data-ko="누가 사용할까요?" data-en="Who's watching?">Who's watching?</h1>
    <p class="profile-subtitle" id="profileSubtitle" data-ko="프로필을 선택하세요" data-en="Select a profile">Select a profile</p>

    <!-- Welcome message for new users -->
    <div id="welcomeMsg" style="display: none; text-align: center; margin-bottom: 24px;">
      <p style="font-family: 'Nunito', 'Noto Sans KR', sans-serif; font-size: 16px; color: #66BB6A; font-weight: 600;">
        <span data-ko="환영합니다! 자녀 프로필을 추가해 주세요 🎉" data-en="Welcome! Please add a child profile 🎉">Welcome! Please add a child profile 🎉</span>
      </p>
    </div>

    <div class="profile-grid" id="profileGrid">
      <!-- Profiles will be dynamically loaded here -->
    </div>

    <!-- Parent Dashboard Link -->
    <div style="margin-top: 16px;">
      <a href="parent-dashboard.html" style="font-family: 'Nunito', 'Noto Sans KR', sans-serif; font-size: 14px; color: #90A4AE; text-decoration: none;" data-ko="부모 대시보드로 이동" data-en="Go to Parent Dashboard">Go to Parent Dashboard</a>
    </div>
  </main>

  <!-- Add Child Modal (hidden by default) -->
  <div class="modal-overlay" id="addChildModal" style="display: none;">
    <div class="modal-card">
      <h2 class="modal-title" data-ko="자녀 프로필 추가" data-en="Add Child Profile">Add Child Profile</h2>
      
      <div class="auth-field">
        <label for="childNickname" data-ko="닉네임" data-en="Nickname">Nickname</label>
        <input type="text" id="childNickname" required placeholder="Enter nickname" maxlength="12" />
      </div>

      <div class="auth-field" style="margin-top: 16px;">
        <label for="childBirthYear" data-ko="출생 연도 (선택)" data-en="Birth Year (optional)">Birth Year (optional)</label>
        <input type="number" id="childBirthYear" placeholder="2016" min="2010" max="2022" />
      </div>

      <div style="margin-top: 20px;">
        <label style="font-family: 'Nunito', 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; color: #546E7A; display: block; margin-bottom: 10px;" data-ko="아바타 선택" data-en="Choose Avatar">Choose Avatar</label>
        <div class="avatar-picker" id="avatarPicker">
          <!-- Avatars will be generated by JS -->
        </div>
      </div>

      <div class="auth-error" id="modalError" style="display: none;"></div>

      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modalCancelBtn" data-ko="취소" data-en="Cancel">Cancel</button>
        <button class="modal-btn-save" id="modalSaveBtn" data-ko="추가하기" data-en="Add Profile">Add Profile</button>
      </div>
    </div>
  </div>

  <script src="../scripts/language-switcher.js"></script>
  <script type="module">
    import { auth, isFirebaseConfigured, onAuthStateChanged, getChildProfiles, addChildProfile, setActiveChildProfile } from '../scripts/firebase-config.js';

    const AVATARS = ['🦁', '🐻', '🐰', '🦊', '🐼', '🐨', '🦄', '🐱', '🐶', '🦋', '🌟', '🎨'];
    
    let currentUser = null;
    let selectedAvatarIndex = 0;

    // Show welcome message if new user
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('welcome') === 'true') {
      document.getElementById('welcomeMsg').style.display = 'block';
    }

    // Firebase 미설정 시 데모 모드
    if (!isFirebaseConfigured()) {
      showDemoMode();
    } else {
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
        currentUser = user;
        await loadProfiles();
      });
    }

    /**
     * 데모 모드 - Firebase 미설정 시
     */
    function showDemoMode() {
      const grid = document.getElementById('profileGrid');
      const lang = localStorage.getItem('littleHeroesLanguage') || 'en';
      
      // 데모 프로필 표시
      const demoProfiles = [
        { nickname: lang === 'ko' ? '민준' : 'MinJun', avatarIndex: 0 },
        { nickname: lang === 'ko' ? '서연' : 'SeoYeon', avatarIndex: 2 }
      ];

      grid.innerHTML = '';
      demoProfiles.forEach((profile) => {
        const card = createProfileCard(profile);
        grid.appendChild(card);
      });

      // Add button
      grid.appendChild(createAddCard());
    }

    /**
     * 프로필 목록 로드
     */
    async function loadProfiles() {
      const grid = document.getElementById('profileGrid');
      grid.innerHTML = '';

      try {
        const children = await getChildProfiles(currentUser.uid);
        children.forEach((child) => {
          const card = createProfileCard(child);
          grid.appendChild(card);
        });
      } catch (e) {
        console.error('Error loading profiles:', e);
      }

      // Add profile card (최대 4명)
      const currentCards = grid.querySelectorAll('.profile-card:not(.profile-card-add)');
      if (currentCards.length < 4) {
        grid.appendChild(createAddCard());
      }
    }

    /**
     * 프로필 카드 생성
     */
    function createProfileCard(profile) {
      const card = document.createElement('div');
      card.className = 'profile-card';
      card.innerHTML = `
        <span class="profile-card-avatar">${AVATARS[profile.avatarIndex] || '🌟'}</span>
        <div class="profile-card-name">${profile.nickname}</div>
      `;
      card.addEventListener('click', () => {
        setActiveChildProfile(profile);
        window.location.href = 'home.html';
      });
      return card;
    }

    /**
     * 프로필 추가 카드 생성
     */
    function createAddCard() {
      const lang = localStorage.getItem('littleHeroesLanguage') || 'en';
      const card = document.createElement('div');
      card.className = 'profile-card profile-card-add';
      card.innerHTML = `
        <span class="profile-card-add-icon">+</span>
        <div class="profile-card-add-text">${lang === 'ko' ? '프로필 추가' : 'Add Profile'}</div>
      `;
      card.addEventListener('click', openAddModal);
      return card;
    }

    /**
     * 아바타 피커 초기화
     */
    function initAvatarPicker() {
      const picker = document.getElementById('avatarPicker');
      picker.innerHTML = '';
      AVATARS.forEach((emoji, index) => {
        const option = document.createElement('button');
        option.className = 'avatar-option' + (index === 0 ? ' selected' : '');
        option.textContent = emoji;
        option.type = 'button';
        option.addEventListener('click', () => {
          picker.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
          option.classList.add('selected');
          selectedAvatarIndex = index;
        });
        picker.appendChild(option);
      });
      selectedAvatarIndex = 0;
    }

    /**
     * 모달 열기/닫기
     */
    function openAddModal() {
      document.getElementById('addChildModal').style.display = 'flex';
      document.getElementById('childNickname').value = '';
      document.getElementById('childBirthYear').value = '';
      document.getElementById('modalError').style.display = 'none';
      initAvatarPicker();
    }

    document.getElementById('modalCancelBtn').addEventListener('click', () => {
      document.getElementById('addChildModal').style.display = 'none';
    });

    document.getElementById('addChildModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('addChildModal')) {
        document.getElementById('addChildModal').style.display = 'none';
      }
    });

    /**
     * 프로필 저장
     */
    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
      const nickname = document.getElementById('childNickname').value.trim();
      const birthYear = document.getElementById('childBirthYear').value;
      const errorDiv = document.getElementById('modalError');
      const lang = localStorage.getItem('littleHeroesLanguage') || 'en';

      if (!nickname) {
        errorDiv.textContent = lang === 'ko' ? '닉네임을 입력해 주세요.' : 'Please enter a nickname.';
        errorDiv.style.display = 'block';
        return;
      }

      if (!isFirebaseConfigured()) {
        // 데모 모드: 로컬에서만 추가
        document.getElementById('addChildModal').style.display = 'none';
        showDemoMode();
        return;
      }

      try {
        await addChildProfile(currentUser.uid, {
          nickname,
          avatarIndex: selectedAvatarIndex,
          birthYear: birthYear ? parseInt(birthYear) : null
        });
        document.getElementById('addChildModal').style.display = 'none';
        await loadProfiles();
      } catch (e) {
        errorDiv.textContent = lang === 'ko' ? '프로필 추가 중 오류가 발생했습니다.' : 'Error adding profile.';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
