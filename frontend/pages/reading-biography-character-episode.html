<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Heroes - Episode</title>
    <meta data-page-title-ko="꼬마 위인 - 에피소드" data-page-title-en="Little Heroes - Episode" />
    <link rel="stylesheet" href="../styles/main.css?v=3" />
    <link
      rel="stylesheet"
      href="../styles/reading-biography-character-episode.css?v=3"
    />
    <style>
      .episode-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        align-items: start;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      .episode-text-column {
        flex: 1;
        overflow-y: auto;
        max-height: 600px;
        padding-right: 20px;
      }

      .episode-image-column {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .episode-image-container {
        width: 100%;
        aspect-ratio: 3/4;
        background-color: #C8E6C9;
        border: 2px dashed #A5D6A7;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      .episode-image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .episode-image-placeholder {
        color: #78909C;
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }

      @media (max-width: 1024px) {
        .episode-body {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .episode-text-column {
          max-height: none;
        }

        .episode-image-container {
          max-width: 400px;
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body class="background-green">
    <!-- Tabs Banner -->
    <header class="tabs-banner">
      <nav class="navigation">
        <a href="home.html" class="tab-link" data-ko="홈" data-en="Home">Home</a>
        <a href="talk.html" class="tab-link" data-ko-html="대화하기 <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />" data-en-html="Talk <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />">
          Talk <img src="../images/icons/icon-mic-small.svg" alt="" class="nav-icon" />
        </a>
        <a href="reading-biography.html" class="tab-link active" data-ko-html="위인전 읽기 <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />" data-en-html="Reading Biography <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />">
          Reading Biography <img src="../images/icons/icon-book-small.svg" alt="" class="nav-icon" />
        </a>
        <a href="plan.html" class="tab-link" data-ko="요금제" data-en="Plan">Plan</a>
        <a href="our-vision.html" class="tab-link" data-ko="우리의 비전" data-en="Our Vision">Our Vision</a>
        <div class="logo-icon">
          <img src="../images/corner_icon.png" alt="AI Smiley Icon" />
        </div>
      </nav>
    </header>

    <!-- Page Content -->
    <main class="episode-content">
      <div class="episode-header">
        <h1 id="episode-title" class="text-content2 text-content-lightblue">
          Loading...
        </h1>
      </div>

      <div class="episode-body">
        <div class="episode-text-column">
          <div id="episode-text-content" class="episode-text">
            <!-- Text content will be loaded here -->
          </div>
        </div>

        <div class="episode-image-column">
          <div class="episode-image-container">
            <img id="episode-image" src="" alt="Episode illustration" style="display: none;" />
            <div id="image-placeholder" class="episode-image-placeholder">
              Image placeholder<br/>(3 images per episode)
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Load episodes data -->
    <script src="../data/episodes-titles.js?v=3"></script>

    <script>
      // Character name mapping
      const characterMap = {
        abe: "abe",
        leo: "leo",
        al: "al",
        isac: "isac",
        socrate: "socrate",
        willy: "willy",
        chales: "chales",
        marie: "marie",
        hellen: "hellen",
        wolf: "wolf",
        charlie: "chally",
        andy: "andy",
      };

      // Get URL parameter
      function getURLParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      // Get current language from language switcher or localStorage
      function getCurrentLanguage() {
        if (window.languageSwitcher) {
          return window.languageSwitcher.getCurrentLanguage();
        }
        return localStorage.getItem('littleHeroesLanguage') || 'en';
      }

      // Global variable to store loaded content
      let loadedEpisodeContent = null;

      // Load text content from JavaScript file
      function loadTextContent(character, episodeNumber, callback) {
        // Reset the global variable
        loadedEpisodeContent = null;

        // Create a script element to load the JS file
        const script = document.createElement("script");
        script.src = `../data/episode-content/${character}/${episodeNumber}.js`;

        script.onload = function () {
          if (typeof episodeContent !== "undefined") {
            loadedEpisodeContent = episodeContent;
            // Clear the global variable
            delete window.episodeContent;
            script.remove();
            callback(null, loadedEpisodeContent);
          } else {
            script.remove();
            callback(
              new Error("Episode content not found in loaded file"),
              null
            );
          }
        };

        script.onerror = function () {
          script.remove();
          callback(new Error("Failed to load episode content file"), null);
        };

        document.head.appendChild(script);
      }

      // Format text into paragraphs
      function formatText(text) {
        const paragraphs = text
          .split("\n\n")
          .filter((p) => p.trim().length > 0);
        return paragraphs
          .map(
            (paragraph) => `<p class="text-content3">${paragraph.trim()}</p>`
          )
          .join("");
      }

      // Load and display episode
      function loadEpisode() {
        const characterParam = getURLParameter("character");
        const episodeParam = getURLParameter("episode");

        if (!characterParam || !episodeParam) {
          document.getElementById("episode-title").textContent =
            "Character or episode not specified";
          return;
        }

        const characterKey = characterMap[characterParam.toLowerCase()];
        const episodeNumber = parseInt(episodeParam);

        if (!characterKey) {
          document.getElementById("episode-title").textContent =
            "Character not found";
          return;
        }

        if (!episodesData || !episodesData[characterKey]) {
          document.getElementById("episode-title").textContent =
            "Character data not found";
          return;
        }

        const characterData = episodesData[characterKey];
        const episodeData = characterData.episodes[episodeNumber - 1];

        if (!episodeData) {
          document.getElementById("episode-title").textContent =
            "Episode not found";
          return;
        }

        // Get current language
        const currentLang = getCurrentLanguage();
        const episodeTitle = currentLang === 'ko' ? episodeData.title_ko : episodeData.title_en;

        // Update title
        const episodeLabel = currentLang === 'ko' ? '에피소드' : 'Episode';
        document.getElementById(
          "episode-title"
        ).textContent = `${episodeLabel} ${episodeNumber}) ${episodeTitle}`;
        
        if (currentLang === 'ko') {
          document.title = `꼬마 위인 - ${characterData.fullName} - ${episodeTitle}`;
        } else {
          document.title = `Little Heroes - ${characterData.fullName} - ${episodeTitle}`;
        }

        // Load text content
        loadTextContent(characterKey, episodeNumber, (error, textContent) => {
          if (error) {
            console.error("Error loading text content:", error);
            document.getElementById("episode-text-content").innerHTML =
              "<p class='text-content3'>Content not available for this episode. Error: " +
              error.message +
              "</p>";
          } else {
            // Get content in the current language
            let displayContent = '';
            let showFallbackNotice = false;
            if (typeof textContent === 'object' && textContent !== null) {
              if (currentLang === 'ko' && textContent['ko'] && textContent['ko'].trim() !== '') {
                displayContent = textContent['ko'];
              } else if (textContent['en']) {
                displayContent = textContent['en'];
                if (currentLang === 'ko') showFallbackNotice = true;
              }
            } else {
              displayContent = textContent || '';
            }
            let html = '';
            if (showFallbackNotice) {
              html += '<p class="text-content3" style="color: #78909C; font-style: italic; margin-bottom: 16px; font-family: Noto Sans KR, sans-serif;">한국어 번역이 준비 중입니다. 영어 원문을 표시합니다.</p>';
            }
            html += formatText(displayContent);
            document.getElementById("episode-text-content").innerHTML = html;
          }
        });

        // Set image (you can customize image paths based on character and episode)
        const imageElement = document.getElementById("episode-image");
        const imagePlaceholder = document.getElementById("image-placeholder");
        // Image format: character-episode-Number (e.g., abe-episode-1.png)
        // Try both .png and .jpg extensions
        const imagePath = `../images/episodes-images/${characterKey}-episode-${episodeNumber}`;
        imageElement.src = `${imagePath}.png`;
        imageElement.alt = `${episodeTitle} illustration`;
        imageElement.onerror = function () {
          // Try .jpg if .png fails
          this.src = `${imagePath}.jpg`;
          this.onerror = function () {
            // Hide image if both formats fail, keep placeholder visible
            this.style.display = "none";
            imagePlaceholder.style.display = "flex";
          };
        };
        imageElement.onload = function () {
          imagePlaceholder.style.display = "none";
          imageElement.style.display = "block";
        };
      }

      // Listen for language changes
      window.addEventListener('languageChanged', function(e) {
        loadEpisode();
      });

      // Initialize on page load
      window.addEventListener("DOMContentLoaded", loadEpisode);

      // Handle browser back/forward navigation
      window.addEventListener("popstate", loadEpisode);
    </script>

    <!-- Global Language Switcher -->
    <script src="../scripts/language-switcher.js?v=3"></script>
  </body>
</html>
