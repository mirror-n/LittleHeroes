<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Heroes - Log In</title>
  <link rel="stylesheet" href="../styles/main.css?v=4" />
  <link rel="stylesheet" href="../styles/auth.css?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Navigation -->
  <header class="tabs-banner">
    <nav class="navigation">
      <a href="home.html" class="tab-link" data-ko="홈" data-en="Home">Home</a>
      <a href="talk.html" class="tab-link" data-ko-html="대화하기 <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />" data-en-html="Talk <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />">
        Talk <img src="../images/icons/icon-mic-small.svg" alt="" class="nav-icon" />
      </a>
      <a href="reading-biography.html" class="tab-link" data-ko-html="위인전 읽기 <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />" data-en-html="Reading Biography <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />">
        Reading Biography <img src="../images/icons/icon-book-small.svg" alt="" class="nav-icon" />
      </a>
      <a href="plan.html" class="tab-link" data-ko="요금제" data-en="Plan">Plan</a>
      <a href="our-vision.html" class="tab-link" data-ko="우리의 비전" data-en="Our Vision">Our Vision</a>
      <div class="logo-icon">
        <img src="../images/corner_icon.png" alt="Little Heroes Icon" />
      </div>
    </nav>
  </header>

  <!-- Login Form -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title" data-ko="로그인" data-en="Log In">Log In</h1>
        <p class="auth-subtitle" data-ko="Little Heroes에 오신 것을 환영합니다!" data-en="Welcome back to Little Heroes!">Welcome back to Little Heroes!</p>
      </div>

      <!-- Error Message -->
      <div class="auth-error" id="authError" style="display: none;"></div>

      <!-- Email/Password Form -->
      <form id="loginForm" class="auth-form">
        <div class="auth-field">
          <label for="email" data-ko="이메일" data-en="Email">Email</label>
          <input type="email" id="email" required placeholder="parent@example.com" />
        </div>
        <div class="auth-field">
          <label for="password" data-ko="비밀번호" data-en="Password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="auth-btn auth-btn-primary" data-ko="로그인" data-en="Log In">Log In</button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span data-ko="또는" data-en="or">or</span>
      </div>

      <!-- Google Login -->
      <button class="auth-btn auth-btn-google" id="googleLoginBtn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        <span data-ko="Google로 로그인" data-en="Continue with Google">Continue with Google</span>
      </button>

      <!-- Sign Up Link -->
      <div class="auth-footer">
        <span data-ko="계정이 없으신가요?" data-en="Don't have an account?">Don't have an account?</span>
        <a href="signup.html" data-ko="회원가입" data-en="Sign Up">Sign Up</a>
      </div>
    </div>
  </main>

  <script src="../scripts/language-switcher.js"></script>
  <script type="module">
    import { isFirebaseConfigured, loginWithEmail, signInWithGoogle } from '../scripts/firebase-config.js';

    const loginForm = document.getElementById('loginForm');
    const googleBtn = document.getElementById('googleLoginBtn');
    const errorDiv = document.getElementById('authError');

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
    }

    // 이메일/비밀번호 로그인
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      if (!isFirebaseConfigured()) {
        showError('Firebase가 아직 설정되지 않았습니다. 설정 가이드를 참고해 주세요.');
        return;
      }

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await loginWithEmail(email, password);
        window.location.href = 'select-profile.html';
      } catch (error) {
        const lang = localStorage.getItem('littleHeroesLanguage') || 'en';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          showError(lang === 'ko' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : 'Invalid email or password.');
        } else {
          showError(lang === 'ko' ? '로그인 중 오류가 발생했습니다.' : 'An error occurred during login.');
        }
      }
    });

    // Google 로그인
    googleBtn.addEventListener('click', async () => {
      hideError();

      if (!isFirebaseConfigured()) {
        showError('Firebase가 아직 설정되지 않았습니다. 설정 가이드를 참고해 주세요.');
        return;
      }

      try {
        await signInWithGoogle();
        window.location.href = 'select-profile.html';
      } catch (error) {
        const lang = localStorage.getItem('littleHeroesLanguage') || 'en';
        showError(lang === 'ko' ? 'Google 로그인 중 오류가 발생했습니다.' : 'An error occurred during Google login.');
      }
    });
  </script>
</body>
</html>
