<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Heroes - Talk</title>
    <link rel="stylesheet" href="../styles/main.css?v=3" />
    <link rel="stylesheet" href="../styles/talk.css?v=3" />
    <link rel="stylesheet" href="../styles/talk-character.css?v=3" />
    <meta data-page-title-ko="꼬마 위인 - 대화하기" data-page-title-en="Little Heroes - Talk" />
  </head>
  <body class="background-red">
    <!-- Tabs Banner -->
    <header class="tabs-banner">
      <nav class="navigation">
        <a href="home.html" class="tab-link" data-ko="홈" data-en="Home">Home</a>
        <a href="talk.html" class="tab-link active" data-ko-html="대화하기 <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />" data-en-html="Talk <img src='../images/icons/icon-mic-small.svg' alt='' class='nav-icon' />">
          Talk <img src="../images/icons/icon-mic-small.svg" alt="" class="nav-icon" />
        </a>
        <a href="reading-biography.html" class="tab-link" data-ko-html="위인전 읽기 <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />" data-en-html="Reading Biography <img src='../images/icons/icon-book-small.svg' alt='' class='nav-icon' />">
          Reading Biography <img src="../images/icons/icon-book-small.svg" alt="" class="nav-icon" />
        </a>
        <a href="plan.html" class="tab-link" data-ko="요금제" data-en="Plan">Plan</a>
        <a href="our-vision.html" class="tab-link" data-ko="우리의 비전" data-en="Our Vision">Our Vision</a>
        <div class="logo-icon">
          <img src="../images/corner_icon.png" alt="Little Heroes Icon" />
        </div>
      </nav>
    </header>

    <!-- Page Content -->
    <main class="character-detail-content">
      <div class="character-window background-darkblue">
        <div
          class="character-name-corner text-card-quality"
          id="character-name-display"
        ></div>

        <div class="character-icons-top-right">
          <img src="../images/icons/icon-webcam.svg" alt="Webcam" class="chat-icon" />
        </div>

        <div class="character-icons-left">
          <img src="../images/icons/icon-microphone.svg" alt="Microphone" class="chat-icon" />
          <img src="../images/icons/icon-speaker.svg" alt="Speaker" class="chat-icon" />
        </div>

        <div class="character-icons-right">
          <img src="../images/icons/icon-book.svg" alt="Book" class="chat-icon" />
        </div>

        <div class="character-image-container">
          <img id="character-image-display" src="" alt="" />
        </div>

        <div class="character-chat">
          <div id="character-reply" class="character-reply"></div>
          <div id="suggested-replies" class="suggested-replies"></div>
          <div class="character-input-row">
            <input
              id="character-input"
              class="character-input"
              type="text"
              data-ko="메시지를 입력하세요..."
              data-en="Type your message..."
              placeholder="Type your message..."
            />
            <button id="character-send" class="character-send" type="button" data-ko="보내기" data-en="Send">
              Send
            </button>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Character data mapping
      const characters = {
        abe: {
          name: "Abe",
          image: "../images/portaits/children/card_abe.png",
          imageStyle: "",
          backendSlug: "abraham-lincoln",
        },
        leo: {
          name: "Leo",
          image: "../images/portaits/children/card_leo.png",
          imageStyle: "",
          backendSlug: "leonardo-da-vinci",
        },
        al: {
          name: "Al",
          image: "../images/portaits/children/card_al.png",
          imageStyle: "",
          backendSlug: "albert-einstein",
        },
        ike: {
          name: "Ike",
          image: "../images/portaits/children/card_ike.png",
          imageStyle: "",
          backendSlug: "isaac-newton",
        },
        socrate: {
          name: "Socrate",
          image: "../images/portaits/children/card_socrate.png",
          imageStyle: "transform: scaleX(0.95) scaleY(0.95)",
          backendSlug: "socrates",
        },
        willy: {
          name: "Willy",
          image: "../images/portaits/children/card_willy.png",
          imageStyle: "",
          backendSlug: "william-shakespeare",
        },
        chales: {
          name: "Chales",
          image: "../images/portaits/children/card_chales.png",
          imageStyle: "",
          backendSlug: "charles-darwin",
        },
        marie: {
          name: "Marie",
          image: "../images/portaits/children/card_marie.png",
          imageStyle: "",
          backendSlug: "marie-curie",
        },
        hellen: {
          name: "Hellen",
          image: "../images/portaits/children/card_helen.png",
          imageStyle: "transform: scaleX(0.9) scaleY(0.9)",
          backendSlug: "helen-keller",
        },
        wolfi: {
          name: "Wolfi",
          image: "../images/portaits/children/card_wolfi.png",
          imageStyle: "",
          backendSlug: "wolfgang-amadeus-mozart",
        },
        chally: {
          name: "Chally",
          image: "../images/portaits/children/card_chally.png",
          imageStyle: "",
          backendSlug: "charlie-chaplin",
        },
        andy: {
          name: "Andy",
          image: "../images/portaits/children/card_andy.png",
          imageStyle: "",
          backendSlug: "andrew-carnegie",
        },
      };

      let currentCharacterKey = null;
      let currentBackendSlug = null;

      // Generate or retrieve anonymous user ID for long-term memory
      function getOrCreateUserId() {
        const STORAGE_KEY = 'littleHeroesUserId';
        let uid = localStorage.getItem(STORAGE_KEY);
        if (!uid) {
          // Generate UUID v4-like ID
          uid = 'lh-' + 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
          });
          localStorage.setItem(STORAGE_KEY, uid);
        }
        return uid;
      }

      const anonymousUserId = getOrCreateUserId();

      // Get current language from global language switcher
      function getCurrentLanguage() {
        if (window.languageSwitcher) {
          return window.languageSwitcher.getCurrentLanguage();
        }
        return localStorage.getItem('littleHeroesLanguage') || 'en';
      }

      // Get URL parameter
      function getURLParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      // Initialize page based on URL parameter
      function initializePage() {
        const characterParam = getURLParameter("character");

        if (characterParam && characters[characterParam.toLowerCase()]) {
          const character = characters[characterParam.toLowerCase()];
          currentCharacterKey = characterParam.toLowerCase();
          currentBackendSlug = character.backendSlug || "";
          
          document.getElementById("character-name-display").textContent =
            character.name;

          const imgElement = document.getElementById("character-image-display");
          imgElement.src = character.image;
          imgElement.alt = character.name;

          if (character.imageStyle) {
            imgElement.style.cssText = character.imageStyle;
          } else {
            imgElement.style.cssText = "";
          }

          document.title = `Little Heroes - Talk with ${character.name}`;
        } else {
          window.location.href = "talk.html";
        }
      }

      function getApiBaseUrl() {
        const host = window.location.hostname;
        if (host === "localhost" || host === "127.0.0.1") {
          return "http://localhost:3001";
        }
        // Use same-origin: the API runs on the same server as the frontend
        return window.location.origin;
      }

      // Initialize on page load
      window.addEventListener("DOMContentLoaded", () => {
        initializePage();

        const input = document.getElementById("character-input");
        const sendButton = document.getElementById("character-send");
        const reply = document.getElementById("character-reply");

        async function sendMessage() {
          const text = input.value.trim();
          if (!text) return;

          const lang = getCurrentLanguage();
          reply.textContent = lang === 'ko' ? "생각 중..." : "Thinking...";

          const payload = {
            message: text,
            character: currentBackendSlug || "",
            language: lang,
            userId: anonymousUserId,
          };

          try {
            const response = await fetch(`${getApiBaseUrl()}/api/chat`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            let data = {};
            try {
              data = await response.json();
            } catch {
              data = {};
            }

            if (!response.ok) {
              const errorMessage = data.error || "Server error";
              throw new Error(errorMessage);
            }

            reply.textContent = data.answer || (lang === 'ko' ? "아직 답이 없어." : "No answer yet.");

            // Render suggested replies
            renderSuggestedReplies(data.suggestedReplies || []);
          } catch (error) {
            const message =
              error && error.message ? error.message : (lang === 'ko' ? "AI 서버에 연결할 수 없어." : "Unable to reach the AI server.");
            reply.textContent = lang === 'ko' ? `오류: ${message}` : `Error: ${message}`;
          }
          input.value = "";
          input.focus();
        }

        // Render suggested reply buttons
        function renderSuggestedReplies(suggestions) {
          const container = document.getElementById('suggested-replies');
          container.innerHTML = '';

          if (!suggestions || suggestions.length === 0) return;

          suggestions.forEach(function(text) {
            const btn = document.createElement('button');
            btn.className = 'suggested-reply-btn';
            btn.textContent = text;
            btn.addEventListener('click', function() {
              input.value = text;
              // Clear suggestions immediately on click
              container.innerHTML = '';
              sendMessage();
            });
            container.appendChild(btn);
          });
        }

        sendButton.addEventListener("click", sendMessage);
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            sendMessage();
          }
        });

        // Listen for global language change events
        window.addEventListener('languageChanged', (e) => {
          // Update placeholder text based on language
          const lang = e.detail.language;
          input.placeholder = lang === 'ko' ? '메시지를 입력하세요...' : 'Type your message...';
          sendButton.textContent = lang === 'ko' ? '보내기' : 'Send';
        });
      });

      window.addEventListener("popstate", initializePage);
    </script>

    <!-- Global Language Switcher -->
    <script src="../scripts/language-switcher.js?v=3"></script>
  </body>
</html>
